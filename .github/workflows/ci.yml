name: CI - Linting & Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install -r requirements-dev.txt

      - name: Run Ruff linter
        run: |
          ruff check . --config pyproject.toml

      - name: Check code formatting with Black
        run: |
          black . --check --diff

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests (with coverage)
        working-directory: frontend
        run: npm run coverage

      # Shields.io "endpoint" badge JSON, published to the `badges` branch by
      # the badges job below (push to main only).
      - name: Write frontend coverage badge JSON
        run: |
          PCT=$(jq -r '.total.statements.pct' frontend/coverage/coverage-summary.json)
          ./.github/scripts/coverage-badge.sh "frontend coverage" "$PCT" > frontend-coverage.json
          cat frontend-coverage.json

      - name: Upload frontend badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-badge
          path: frontend-coverage.json

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: witness
          POSTGRES_USER: witness
          POSTGRES_PASSWORD: witness-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U witness -d witness"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_URL: postgresql://witness:witness-ci@localhost:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install package with test extras
        run: pip install -e ".[test]"

      - name: Run pytest (with coverage)
        run: pytest -ra --cov=src --cov-report=term --cov-report=json:coverage.json

      # Shields.io "endpoint" badge JSON, published to the `badges` branch by
      # the badges job below (push to main only).
      - name: Write backend coverage badge JSON
        run: |
          PCT=$(jq -r '.totals.percent_covered' coverage.json)
          ./.github/scripts/coverage-badge.sh "backend coverage" "$PCT" > backend-coverage.json
          cat backend-coverage.json

      - name: Upload backend badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-badge
          path: backend-coverage.json

  # Publishes the two badge JSON files to an orphan `badges` branch, which the
  # README's shields.io endpoint badges read via raw.githubusercontent.com.
  # Self-contained: no third-party coverage service, no extra secrets — the
  # default GITHUB_TOKEN with contents:write is enough. The branch is a single
  # force-pushed commit (no history) and is created automatically on first run.
  badges:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download badge artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-coverage-badge'
          merge-multiple: true
          path: badges

      - name: Force-push badges branch
        working-directory: badges
        run: |
          git init -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "coverage badges for ${GITHUB_SHA}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            badges

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  docker-build:
    # Public CI can only build the STARTER edition: the enterprise image needs the
    # proprietary kyde-enterprise wheel, which lives in the private
    # gateway-enterprise repo and is never present here. An enterprise build would hard-
    # fail on the Dockerfile's missing-wheel guard. The enterprise image is built and
    # published by the gateway-enterprise pipeline. See docs/ci.md.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build starter Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            EDITION=starter
          push: false
          load: true
          tags: kyde-proxy:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test edition
        run: |
          docker run --rm kyde-proxy:test \
            python -c "from kyde._features import edition; assert edition()=='starter', edition()"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: 'kyde-proxy:test'
          format: 'sarif'
          output: 'docker-trivy-results.sarif'
        continue-on-error: true

      - name: Upload Docker scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'docker-trivy-results.sarif'
          category: 'docker-scan'
        continue-on-error: true
