source: presidio
version: "1.0.0"
description: "Microsoft Presidio PII patterns"
enabled: true

patterns:
  - id: us_ssn
    name: "US Social Security Number"
    category: pii
    severity: CRITICAL
    base_confidence: 0.80
    validator_id: ssn
    tags: [ssn, government_id, us, pii]
    description: "US SSN with format XXX-XX-XXXX"
    pattern: >-
      \b(?!000|666|9\d{2})\d{3}-(?!00)\d{2}-(?!0000)\d{4}\b
    examples:
      - "123-45-6789"
      - "987-65-4321"

  - id: iban
    name: "International Bank Account Number"
    category: financial
    severity: HIGH
    base_confidence: 0.75
    validator_id: iban
    tags: [iban, bank, international, financial]
    description: "IBAN (ISO 13616) format"
    pattern: >-
      \b[A-Z]{2}[0-9]{2}[A-Z0-9]{4}[0-9]{7}([A-Z0-9]?){0,16}\b
    examples:
      - "GB29NWBK60161331926819"
      - "DE89370400440532013000"

  - id: passport_number_us
    name: "US Passport Number"
    category: pii
    severity: HIGH
    base_confidence: 0.65
    validator_id: null
    tags: [passport, government_id, us, pii]
    description: "US Passport number format"
    pattern: >-
      \b[A-Z]{1}[0-9]{8}\b
    examples:
      - "C12345678"

  - id: credit_card_generic
    name: "Generic Credit Card"
    category: financial
    severity: CRITICAL
    base_confidence: 0.65
    validator_id: luhn
    tags: [credit_card, payment, financial]
    description: "Generic 13-16 digit card number"
    pattern: >-
      \b(?:\d{4}[-\s]?){3}\d{4}\b
    examples:
      - "1234 5678 9012 3456"
