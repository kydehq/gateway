source: google_dlp
version: "1.0.0"
description: "Google Cloud DLP InfoType patterns"
enabled: true

patterns:
  - id: credit_card_number
    name: "Credit Card Number"
    category: financial
    severity: CRITICAL
    base_confidence: 0.75
    validator_id: luhn
    tags: [credit_card, financial, payment]
    description: "13-19 digit credit card number"
    pattern: >-
      \b(?:\d{4}[-\s]?){3}\d{3,4}\b
    examples:
      - "4111111111111111"
      - "1234-5678-9012-3456"

  - id: sin_number
    name: "Canadian Social Insurance Number"
    category: pii
    severity: HIGH
    base_confidence: 0.70
    validator_id: null
    tags: [sin, government_id, canada, pii]
    description: "Canadian Social Insurance Number (SIN)"
    pattern: >-
      \b\d{3}[ \-]?\d{3}[ \-]?\d{3}\b
    examples:
      - "123 456 789"

  - id: pan_india
    name: "Indian PAN Number"
    category: pii
    severity: HIGH
    base_confidence: 0.75
    validator_id: null
    tags: [pan, government_id, india, pii]
    description: "Indian Permanent Account Number"
    pattern: >-
      [A-Z]{5}[0-9]{4}[A-Z]{1}
    examples:
      - "AAAAA1111A"

  - id: driving_license
    name: "Driving License Number"
    category: pii
    severity: MEDIUM
    base_confidence: 0.60
    validator_id: null
    tags: [license, government_id, pii]
    description: "Generic driving license number"
    pattern: >-
      \b[A-Z]{2}\d{2}\s\d{3}\s[0-9A-Z]{3}|[A-Z]{2}\d{5}\d{4}[A-Z0-9]{2}\b
    examples:
      - "AB12 345 ABC"

  - id: medical_record_number
    name: "Medical Record Number"
    category: health
    severity: HIGH
    base_confidence: 0.60
    validator_id: null
    tags: [medical, health, mrn]
    description: "Medical record number"
    pattern: >-
      (?i)\b(?:mrn|medical\s?record\s?#?|patient\s?id)[:\s]+([A-Z0-9]{6,20})\b
    examples:
      - "MRN: 123456789"
