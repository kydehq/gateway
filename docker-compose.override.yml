# DEV posture — auto-merged on top of docker-compose.yml by a bare
# `docker compose up`. The ONLY file that builds locally and publishes to the
# host. Prod names its -f files explicitly, which suppresses this override.
#
#   docker compose up --build                         # starter, built from source
#   docker compose --env-file .env.enterprise-dev up --build # enterprise (needs ./wheels/*.whl)
#   docker compose --profile dev up --build           # + mailpit + validator
#
# `ports` here ADD to the base `expose` (compose concatenates port lists across
# files), giving direct host access for local curling and Vite's hot-reload
# proxy. Edition of the local build is ${EDITION:-starter}; enterprise also needs the
# kyde-enterprise wheel in ./wheels/ (see docs/building-images.md).

services:
  postgres:
    # Loopback-exposed so the host test suite can reach Postgres.
    ports:
      - "127.0.0.1:5432:5432"

  kyde-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EDITION: ${EDITION:-starter}
    ports:
      - "8081:8000"

  kyde-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EDITION: ${EDITION:-starter}
    ports:
      - "8501:8501"

  kyde-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "4000:4000"

  dlp-regex:
    ports:
      - "8002:8000"
    volumes:
      - ./dlp-patterns:/app/patterns:ro
      - ./dlp-config:/app/config:ro

  dlp-bert:
    ports:
      - "8001:8000"

  kyde-validator:
    # Dev port so you can poke Ollama directly:
    #   curl http://localhost:11435/api/tags
    ports:
      - "127.0.0.1:11435:11434"
