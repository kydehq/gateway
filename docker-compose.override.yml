# EVAL posture — auto-merged on top of docker-compose.yml by a bare
# `docker compose up -d`. Pulls the published images from GHCR (nothing is
# built on your host) and publishes only the UI, loopback-only: admin on
# 127.0.0.1:8080, agent proxy on 127.0.0.1:4000.
#
# This is the quickstart path. The other postures name their -f files
# explicitly, which suppresses this override:
#
#   dev  (local build + all host ports):
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   prod (pull + hardening: workers, restart:always, limits, log rotation):
#     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  kyde-ui:
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:4000:4000"
