# KYDE Gateway — UI container nginx config.
#
# Two listeners, one container, one TLS story:
#
#   :80   → admin surface (SPA + JSON API + auth flows)
#              /api/*                → kyde-api
#              /login, /setup, …     → kyde-api
#              /assets/*             → static SPA bundle
#              /                     → SPA shell (index.html)
#           No /v1/* routes here.
#
#   :4000 → LLM proxy surface (what agents talk to)
#              /v1/*                 → kyde-gateway
#              /<provider>/v1/*      → kyde-gateway
#              /mcp/<server_name>    → kyde-gateway (MCP routing v1)
#           Nothing else answers on this port.
#
# This split means /api/v1/... on the admin side can never collide with
# the proxy's /v1/..., and agents that hammer the proxy don't share a
# connection pool with browser traffic.
#
# Upstream names resolve via docker-compose DNS.

upstream kyde_proxy {
    server kyde-gateway:8000;
    keepalive 16;
}

upstream kyde_dashboard {
    server kyde-api:8501;
    keepalive 16;
}

# ═════════════════════════════════════════════════════════════════════════
# Admin / browser surface — :80
# ═════════════════════════════════════════════════════════════════════════
server {
    listen      80 default_server;
    server_name _;

    client_max_body_size 25m;
    keepalive_timeout    65s;

    # Liveness probe — cheap, no upstream dependency.
    location = /healthz {
        access_log off;
        return    200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Dashboard: JSON API + server-rendered auth pages. Cookies flow
    # naturally because browser sees only the nginx host.
    location ~ ^/(api|login|logout|setup|change-password|openapi\.json|_stcore|favicon\.ico)(/|$) {
        proxy_pass              http://kyde_dashboard;
        proxy_http_version      1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_pass_header       Set-Cookie;
        proxy_read_timeout      60s;
    }

    # Static SPA bundle. Fingerprinted assets are immutable, shell must
    # never be cached or users get stuck on old JS after a deploy.
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}

# ═════════════════════════════════════════════════════════════════════════
# LLM proxy surface — :4000
# ═════════════════════════════════════════════════════════════════════════
server {
    listen      4000;
    server_name _;

    # Agents post large bodies and stream tokens via SSE. Disable nginx
    # buffering so chunks reach the client without nginx holding them,
    # and give model responses a generous timeout.
    client_max_body_size 25m;

    location = /healthz {
        access_log off;
        return    200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Direct /v1/* → proxy. Auto-detects provider from endpoint path.
    location /v1/ {
        proxy_pass              http://kyde_proxy;
        proxy_http_version      1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }

    # Provider-prefixed routes: /openai/v1/…, /anthropic/v1/…, /ollama/v1/…
    # Any slug matching [a-zA-Z0-9_-]+ followed by /v1 goes to the proxy,
    # so new upstreams added to config.yaml route immediately.
    location ~ ^/[a-zA-Z0-9_-]+/v1(/|$) {
        proxy_pass              http://kyde_proxy;
        proxy_http_version      1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }

    # MCP routing v1 — aggregator (bare /mcp) and per-server (/mcp/<name>).
    # Both share the same streaming/timeout shape as the LLM proxy since
    # MCP speaks Streamable HTTP and tool calls can run long.
    #
    # The two `location =` blocks below match the bare path exactly so they
    # take precedence over the regex below (per nginx matching rules:
    # exact > prefix > regex). M4 added the aggregator.
    location = /mcp {
        proxy_pass              http://kyde_proxy;
        proxy_http_version      1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }
    location = /mcp/ {
        proxy_pass              http://kyde_proxy;
        proxy_http_version      1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }
    location ~ ^/mcp/[a-zA-Z0-9_-]+$ {
        proxy_pass              http://kyde_proxy;
        proxy_http_version      1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }

    # Anything else on :4000 is a misaddressed call. 404 with a hint
    # rather than silently falling through to a shell or another service.
    location / {
        default_type text/plain;
        return 404 "Not found. This endpoint serves the LLM proxy at /v1/*, /<provider>/v1/*, or MCP at /mcp/<server_name> (per-server) or /mcp (aggregator).\n";
    }
}
